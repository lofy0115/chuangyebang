name: Build Flutter APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Analyze code
        working-directory: ./frontend
        run: flutter analyze --no-fatal-warnings 2>&1
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi
          echo "=== Flutter Doctor ==="
          flutter doctor 2>&1
          echo "=== ANDROID_HOME ==="
          echo $ANDROID_HOME
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME

      - name: Build debug APK
        working-directory: ./frontend
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1
          EXIT_CODE=$?
          echo "EXIT_CODE=$EXIT_CODE"
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND"
          exit $EXIT_CODE

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
          if-no-files-found: warn

  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi

      - name: Build release APK
        working-directory: ./frontend
        run: |
          set -o pipefail
          flutter build apk --release 2>&1
          EXIT_CODE=$?
          echo "EXIT_CODE=$EXIT_CODE"
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND"
          exit $EXIT_CODE

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
          if-no-files-found: warn

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build web
        working-directory: ./frontend
        run: flutter build web --release 2>&1

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/build/web/
          retention-days: 14