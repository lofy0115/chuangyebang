name: Build Flutter APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Analyze code
        working-directory: ./frontend
        run: flutter analyze 2>&1
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          flutter doctor -v 2>&1 | head -40

      - name: Build debug APK
        working-directory: ./frontend
        run: |
          flutter build apk --debug 2>&1
          echo "---APK FILES---"
          find . -name "*.apk" -type f 2>/dev/null

      - name: Build release APK
        working-directory: ./frontend
        run: |
          flutter build apk --release 2>&1
          echo "---APK FILES---"
          find . -name "*.apk" -type f 2>/dev/null

      - name: Upload debug APK
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build web
        working-directory: ./frontend
        run: |
          flutter build web --release 2>&1
          echo "---WEB FILES---"
          ls -la build/web/ 2>/dev/null | head -10

      - name: Upload web build
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/build/web/
          retention-days: 14