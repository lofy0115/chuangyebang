name: Build Flutter APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Analyze code
        working-directory: ./frontend
        run: flutter analyze --no-fatal-warnings 2>&1
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          echo "=== Flutter Doctor ==="
          flutter doctor -v 2>&1 | head -50

      - name: Build debug APK
        working-directory: ./frontend
        run: |
          echo "=== Building Debug APK ==="
          flutter build apk --debug 2>&1
          APK_PATH=$(find . -name "app-debug.apk" -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK_PATH"
          if [ -n "$APK_PATH" ]; then
            echo "APK found: $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "ERROR: No APK found after build"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
          if-no-files-found: warn

  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build release APK
        working-directory: ./frontend
        run: |
          echo "=== Building Release APK ==="
          flutter build apk --release 2>&1
          APK_PATH=$(find . -name "app-release.apk" -type f 2>/dev/null | head -1)
          echo "APK_PATH=$APK_PATH"
          if [ -n "$APK_PATH" ]; then
            echo "APK found: $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "ERROR: No APK found after build"
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
          if-no-files-found: warn

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Build web
        working-directory: ./frontend
        run: flutter build web --release 2>&1

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/build/web/
          retention-days: 14