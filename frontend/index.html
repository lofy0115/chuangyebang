<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a1a2e">
  <title>创业帮 - 从消费者抱怨中发现新商机</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card2: #232340;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #22d3ee;
      --accent2: #f472b6;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 100px;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* Screen */
    .screen { display: none; padding: 20px; }
    .screen.active { display: block; }

    /* Step indicator */
    .steps {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }
    .step {
      flex: 1;
      height: 4px;
      background: var(--card2);
      border-radius: 2px;
      transition: all 0.3s;
    }
    .step.done { background: var(--primary); }
    .step.active { background: var(--accent); }

    /* Cards */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    /* Search */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-input {
      flex: 1;
      background: var(--card2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--primary); }
    .search-input::placeholder { color: var(--text3); }

    /* Buttons */
    .btn {
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }
    .btn-primary {
      background: var(--gradient);
      color: white;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-secondary {
      background: var(--card2);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-sm {
      padding: 10px 16px;
      font-size: 14px;
      width: auto;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--card2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text2); font-size: 14px; }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--card2);
      border-radius: 3px;
      overflow: hidden;
      margin: 16px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--gradient);
      border-radius: 3px;
      transition: width 0.5s;
    }

    /* Pain points */
    .pain-point-card {
      background: var(--card2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pain-point-card:hover { border-color: var(--primary); }
    .pain-point-card.selected { border-color: var(--accent); background: rgba(34,211,238,0.08); }
    .pain-point-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .pain-point-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .pain-point-score {
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--primary);
      color: white;
    }
    .pain-point-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--text3);
      margin-bottom: 8px;
    }
    .pain-point-meta span { display: flex; align-items: center; gap: 4px; }
    .pain-point-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
    }
    .priority-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .priority-high { background: rgba(239,68,68,0.2); color: var(--danger); }
    .priority-medium { background: rgba(245,158,11,0.2); color: var(--warning); }
    .priority-low { background: rgba(16,185,129,0.2); color: var(--success); }

    /* Model cards */
    .model-card {
      background: var(--card2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .model-card:hover { border-color: var(--primary); }
    .model-card.selected { border-color: var(--accent); }
    .model-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .model-name { font-size: 15px; font-weight: 600; }
    .model-match { font-size: 12px; background: var(--primary); padding: 3px 8px; border-radius: 10px; color: white; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: var(--card2);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

    /* Chart bars */
    .chart-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .chart-label { font-size: 13px; color: var(--text2); width: 50px; }
    .chart-track { flex: 1; height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; }
    .chart-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .chart-value { font-size: 12px; color: var(--text3); width: 40px; text-align: right; }

    /* Roadmap timeline */
    .timeline { position: relative; padding-left: 24px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--primary), var(--accent));
    }
    .phase-item {
      position: relative;
      margin-bottom: 24px;
    }
    .phase-dot {
      position: absolute;
      left: -24px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--bg);
    }
    .phase-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .phase-name { font-size: 15px; font-weight: 600; }
    .phase-duration { font-size: 12px; color: var(--accent); }
    .phase-goal { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
    .task-list { list-style: none; }
    .task-item {
      display: flex;
      gap: 8px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .task-item::before { content: '→'; color: var(--primary); }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 11px;
      transition: color 0.2s;
    }
    .nav-btn.active { color: var(--primary); }
    .nav-icon { font-size: 22px; }

    /* Results */
    .result-item {
      background: var(--card2);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .result-content { font-size: 14px; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
    .result-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text3); }
    .sentiment-bar {
      width: 60px;
      height: 6px;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
    }
    .sentiment-fill { height: 100%; border-radius: 3px; }

    /* Unit economics */
    .econ-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .econ-item {
      background: var(--card2);
      border-radius: 12px;
      padding: 14px;
    }
    .econ-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
    .econ-value { font-size: 18px; font-weight: 700; color: var(--accent); }
    .econ-unit { font-size: 12px; color: var(--text3); }

    /* Forecast chart */
    .forecast-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .forecast-month { font-size: 12px; color: var(--text3); width: 30px; }
    .forecast-bar-wrap { flex: 1; height: 20px; background: var(--card2); border-radius: 4px; overflow: hidden; }
    .forecast-bar { height: 100%; background: var(--gradient); border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 10px; color: white; font-weight: 600; }
    .forecast-value { font-size: 12px; color: var(--text2); width: 60px; text-align: right; }

    /* Navigation buttons */
    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .nav-buttons .btn { flex: 1; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .toast.show { opacity: 1; }

    /* Hint text */
    .hint {
      font-size: 12px;
      color: var(--text3);
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">创业帮</div>
    <div class="tagline">从消费者抱怨中发现创业机会</div>
  </header>

  <div class="steps">
    <div class="step active" id="step1"></div>
    <div class="step" id="step2"></div>
    <div class="step" id="step3"></div>
    <div class="step" id="step4"></div>
  </div>

  <!-- Screen 1: Search -->
  <div class="screen active" id="screen1">
    <div class="card">
      <div class="card-title">🔍 发现商机</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">
        输入你想要了解的行业或产品关键词，系统会从多个平台爬取真实消费者抱怨，AI分析后找出高价值痛点。
      </p>
      <div class="search-box">
        <input class="search-input" id="searchInput" placeholder="例如：新能源汽车、奶茶店、民宿、短视频创业" value="">
      </div>
      <button class="btn btn-primary" id="searchBtn" onclick="startSearch()">
        🚀 开始分析
      </button>
      <p class="hint">支持中英文，会爬取微博/小红书/京东等平台评论</p>
    </div>

    <div id="searchResults"></div>
  </div>

  <!-- Screen 2: Pain Points -->
  <div class="screen" id="screen2">
    <div class="card">
      <div class="card-title">🎯 发现的高价值痛点</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">
        点击选择你要解决的痛点，系统会为你设计对应的利润模式
      </p>
    </div>

    <div id="painPointList"></div>

    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="showScreen(1)">← 上一步</button>
      <button class="btn btn-primary" id="nextPainPointBtn" onclick="selectPainPoint()" disabled>选择痛点 →</button>
    </div>
  </div>

  <!-- Screen 3: Profit Model -->
  <div class="screen" id="screen3">
    <div class="card">
      <div class="card-title">💰 利润模式设计</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px">
        基于你选择的痛点，AI推荐最适合的利润模式。选择后可查看详细的单位经济和12个月收入预测。
      </p>
    </div>

    <div id="modelList"></div>

    <div id="modelDetail" style="display:none"></div>

    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="showScreen(2)">← 上一步</button>
      <button class="btn btn-primary" id="nextModelBtn" onclick="selectModel()" disabled>生成路线图 →</button>
    </div>
  </div>

  <!-- Screen 4: Roadmap -->
  <div class="screen" id="screen4">
    <div class="card">
      <div class="card-title">🗺️ 落地路线图</div>
    </div>

    <div id="roadmapContent"></div>

    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="showScreen(3)">← 上一步</button>
      <button class="btn btn-primary" onclick="startOver()">🔄 重新开始</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showScreen(1)">
      <span class="nav-icon">🔍</span>
      <span>搜索</span>
    </button>
    <button class="nav-btn" onclick="goToNavScreen(2)" id="nav2">
      <span class="nav-icon">🎯</span>
      <span>痛点</span>
    </button>
    <button class="nav-btn" onclick="goToNavScreen(3)" id="nav3">
      <span class="nav-icon">💰</span>
      <span>模式</span>
    </button>
    <button class="nav-btn" onclick="goToNavScreen(4)" id="nav4">
      <span class="nav-icon">🗺️</span>
      <span>路线图</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
// ============ State ============
const API_BASE = window.location.origin.replace(':3000', ':8000');

let state = {
  query: '',
  complaints: [],
  analyzedResult: null,
  selectedPainPoint: null,
  selectedModel: null,
  roadmap: null
};

let selectedPainPointIdx = -1;
let selectedModelIdx = -1;

// ============ Navigation ============
function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + n).classList.add('active');

  document.querySelectorAll('.step').forEach((s, i) => {
    s.classList.remove('active', 'done');
    if (i + 1 < n) s.classList.add('done');
    if (i + 1 === n) s.classList.add('active');
  });

  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', i + 1 === n);
  });
}

function goToNavScreen(n) {
  if (n === 2 && !state.analyzedResult) return;
  if (n === 3 && !state.selectedPainPoint) return;
  if (n === 4 && !state.roadmap) return;
  showScreen(n);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ Step 1: Search ============
async function startSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) { showToast('请输入关键词'); return; }

  state.query = query;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> 分析中...';

  const resultsDiv = document.getElementById('searchResults');
  resultsDiv.innerHTML = `
    <div class="card">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">正在从多个平台爬取消费者抱怨...</div>
        <div style="font-size:12px;color:var(--text3)">微博 · 小红书 · 京东 · 投诉平台</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="scrapeProgress" style="width:0%"></div></div>
    </div>
  `;

  try {
    // 尝试调用真实API
    let complaints = [];
    try {
      const resp = await fetch(`${API_BASE}/api/workflow/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, max_results: 50 })
      });
      if (resp.ok) {
        const data = await resp.json();
        complaints = data.complaints || [];
      }
    } catch (e) {
      console.log('API not available, using mock data');
    }

    // 如果没有真实数据，使用高质量模拟数据
    if (complaints.length === 0) {
      complaints = getMockComplaints(query);
    }

    state.complaints = complaints;
    document.getElementById('scrapeProgress').style.width = '100%';

    // 分析数据
    resultsDiv.innerHTML = `
      <div class="card">
        <div class="loading">
          <div class="spinner"></div>
          <div class="loading-text">AI正在分析${complaints.length}条消费者声音...</div>
        </div>
      </div>
    `;

    let analyzed;
    try {
      const resp = await fetch(`${API_BASE}/api/workflow/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(complaints)
      });
      if (resp.ok) {
        const data = await resp.json();
        analyzed = data;
      }
    } catch (e) {}

    if (!analyzed) {
      analyzed = mockAnalyze(complaints);
    }

    state.analyzedResult = analyzed;

    // 显示统计
    const st = analyzed.statistics;
    resultsDiv.innerHTML = `
      <div class="card">
        <div class="card-title">📊 收集到的消费者声音</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-value">${st.total}</div>
            <div class="stat-label">条抱怨</div>
          </div>
          <div class="stat-box">
            <div class="stat-value">${st.clusters}</div>
            <div class="stat-label">个类型</div>
          </div>
          <div class="stat-box">
            <div class="stat-value">${(st.avg_sentiment * 100).toFixed(0)}%</div>
            <div class="stat-label">负面率</div>
          </div>
        </div>
        <div style="margin-top:8px">
          <div class="chart-bar">
            <div class="chart-label">负面</div>
            <div class="chart-track"><div class="chart-fill" style="width:${st.sentiment_distribution.negative/st.total*100}%;background:var(--danger)"></div></div>
            <div class="chart-value">${st.sentiment_distribution.negative}</div>
          </div>
          <div class="chart-bar">
            <div class="chart-label">正面</div>
            <div class="chart-track"><div class="chart-fill" style="width:${st.sentiment_distribution.positive/st.total*100}%;background:var(--success)"></div></div>
            <div class="chart-value">${st.sentiment_distribution.positive}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">💡 AI洞察</div>
        ${analyzed.insights.slice(0, 3).map(ins => `
          <div style="margin-bottom:10px;padding:12px;background:var(--card2);border-radius:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-weight:600;font-size:14px">${ins.name}</span>
              <span class="priority-badge ${ins.priority === '紧急' ? 'priority-high' : ins.priority === '中等' ? 'priority-medium' : 'priority-low'}">${ins.priority}</span>
            </div>
            <div style="font-size:13px;color:var(--text2);margin-bottom:6px">${ins.description}</div>
            <div style="font-size:12px;color:var(--accent)">💡 ${ins.suggestion}</div>
          </div>
        `).join('')}
      </div>
    `;

    // 渲染痛点列表

function renderPainPoints(painPoints) {
  const list = document.getElementById('painPointList');
  list.innerHTML = painPoints.map((pp, idx) => `
    <div class="pain-point-card" onclick="selectPainPointCard(${idx})" id="pp${idx}">
      <div class="pain-point-header">
        <span class="pain-point-name">${pp.name}</span>
        <span class="pain-point-score">价值 ${(pp.value_score * 100).toFixed(0)}</span>
      </div>
      <div class="pain-point-meta">
        <span>📊 ${pp.frequency}次</span>
        <span>💢 强度 ${(pp.intensity * 100).toFixed(0)}%</span>

function selectPainPointCard(idx) {
  document.querySelectorAll('.pain-point-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('pp' + idx).classList.add('selected');
  selectedPainPointIdx = idx;
  document.getElementById('nextPainPointBtn').disabled = false;
}

async function selectPainPoint() {
  if (selectedPainPointIdx < 0) { showToast('请选择一个痛点'); return; }

  const painPoints = state.analyzedResult.pain_points;
  state.selectedPainPoint = painPoints[selectedPainPointIdx];

  const btn = document.getElementById('nextPainPointBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> 设计中...';

  try {
    let designResult;
    try {
      const resp = await fetch(`${API_BASE}/api/workflow/design`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pain_point: state.selectedPainPoint })
      });
      if (resp.ok) {
        designResult = await resp.json();
      }
    } catch (e) {}

    if (!designResult) {
      designResult = mockDesign(state.selectedPainPoint);
    }

    state.designResult = designResult;

    // 渲染模式列表
    const models = [designResult.recommended_model, ...designResult.comparison?.comparisons?.slice(0, 4) || []].filter(Boolean);
    const modelList = document.getElementById('modelList');
    modelList.innerHTML = models.map((m, idx) => `
      <div class="model-card" onclick="selectModelCard(${idx}, '${m.model}')" id="mc${idx}">
        <div class="model-header">
          <span class="model-name">${m.name}</span>
          <span class="model-match">匹配 ${((m.match_score || 0.5) * 100).toFixed(0)}%</span>

          <span>📈 ${m.difficulty || '中等'}</span>
        </div>
      </div>
    `).join('');

    // 默认选第一个
    selectModelCard(0, models[0]?.model);

    showScreen(3);
    document.getElementById('nav3').style.color = 'var(--accent)';

  } catch (err) {
    showToast('设计失败');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '选择痛点 →';
  }
}
